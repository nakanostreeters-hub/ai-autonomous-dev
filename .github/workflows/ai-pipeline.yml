name: AI Pipeline - Notion → ChatGPT調査 → Claude設計

on:
  push:
    paths:
      - 'HANDOFF.md'
    branches:
      - main
  workflow_dispatch:

jobs:
  ai-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 依存パッケージインストール
        run: npm install

      - name: aiPipeline.js 実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: node aiPipeline.js
